name: Autonomous Security Fix (Claude Sonnet 4.6)

# Triggers:
#  1. All PRs — run a non-blocking npm audit check on every pull request.
#  2. Dependabot PRs — review, fix, and auto-approve safe updates.
#  3. Weekly schedule — proactively scan and fix audit vulnerabilities.
#  4. Manual dispatch — run on-demand at any time.
on:
  pull_request:
    types: [opened, reopened, synchronize]
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Job 0: Security audit on every PR ─────────────────────────────────────
  security-audit:
    name: Security Audit (npm audit)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          echo "=== npm audit report ==="
          npm audit 2>&1 || true
          echo ""
          echo "=== Structured summary ==="
          npm audit --json 2>/dev/null | python3 - <<'EOF'
          import json, sys
          data = json.load(sys.stdin)
          vulns = data.get('vulnerabilities', {})
          fixable = [n for n, v in vulns.items() if v.get('fixAvailable')]
          print(f'Total vulnerabilities : {len(vulns)}')
          print(f'Fixable               : {len(fixable)}')
          print(f'Unfixable             : {len(vulns) - len(fixable)}')
          if vulns:
              print()
              print('Details:')
              for name, v in vulns.items():
                  tag = '✓ fix available' if v.get('fixAvailable') else '✗ no fix yet'
                  print(f'  [{v["severity"]:8s}] {name} — {tag}')
          EOF

  # ── Job 1: Dependabot PR handling ──────────────────────────────────────────
  dependabot-fix:
    name: Review & Fix Dependabot PR
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate npm audit report
        run: |
          npm audit --json > /tmp/audit-report.json || true
          python3 - <<'EOF'
          import json, sys
          with open('/tmp/audit-report.json') as f:
              data = json.load(f)
          vulns = data.get('vulnerabilities', {})
          print(f'Total vulnerabilities: {len(vulns)}')
          for name, v in vulns.items():
              print(f'  [{v["severity"]}] {name} - fixAvailable: {v["fixAvailable"]}')
          EOF

      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Claude Sonnet 4.6 reviews the Dependabot PR, checks for regressions,
      # and applies any remaining security fixes before the PR is merged.
      - name: Autonomous review & fix with Claude Sonnet 4.6
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,FileEditor,FileViewer"
          prompt: |
            You are a security-focused engineer reviewing a Dependabot pull request.

            **PR details:**
            - Dependency: ${{ steps.dependabot-metadata.outputs.dependency-names }}
            - Update type: ${{ steps.dependabot-metadata.outputs.update-type }}
            - Previous version: ${{ steps.dependabot-metadata.outputs.previous-version }}
            - New version: ${{ steps.dependabot-metadata.outputs.new-version }}

            **Your tasks:**
            1. Run `cat /tmp/audit-report.json | python3 -c "import json,sys; d=json.load(sys.stdin); [print(f'[{v[\"severity\"]}] {n}: fixAvailable={v[\"fixAvailable\"]}') for n,v in d.get('vulnerabilities',{}).items()]"` to review remaining issues.
            2. Run `npm run build` to verify the updated dependency does not break the build. If the build fails, revert the breaking change and leave a comment explaining why.
            3. If the update type is "version-update:semver-patch" or "version-update:semver-minor", the update is considered safe. Run `npm audit fix` to pick up any additional transitive fixes.
            4. Commit any changes you make with message: `fix: address residual vulnerabilities after Dependabot update`.
            5. If everything is fine, output exactly: `APPROVE_PR=true`. Otherwise output `APPROVE_PR=false` and a brief explanation.

      - name: Auto-approve safe Dependabot PRs
        if: >
          steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.dependabot-metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for safe Dependabot PRs
        if: >
          steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.dependabot-metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Proactive scheduled / manual security scan ──────────────────────
  autonomous-security-scan:
    name: Autonomous Security Scan & Fix
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit and save report
        run: |
          npm audit --json > /tmp/audit-report.json || true
          echo "=== Audit summary ==="
          npm audit 2>&1 | tail -5 || true

      # Claude Sonnet 4.6 reads the full audit report, applies fixes, verifies
      # the build, and opens a PR with the changes.
      - name: Autonomous fix with Claude Sonnet 4.6
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,FileEditor,FileViewer"
          prompt: |
            You are a security engineer. Your job is to fix npm security vulnerabilities
            in this Next.js project autonomously.

            **Step 1 — Assess the situation:**
            ```bash
            cat /tmp/audit-report.json | python3 -c "
            import json, sys
            d = json.load(sys.stdin)
            vulns = d.get('vulnerabilities', {})
            print(f'Total vulnerabilities: {len(vulns)}')
            for name, v in vulns.items():
                print(f'  [{v[\"severity\"]}] {name} - fixAvailable: {v[\"fixAvailable\"]}')
            "
            ```

            **Step 2 — Apply fixes:**
            - Run `npm audit fix` to apply all non-breaking fixes automatically.
            - If vulnerabilities remain, check if `npm audit fix --force` is safe:
              only use `--force` if it does NOT downgrade a direct dependency in
              `package.json` (i.e., only update transitive deps).
            - For any remaining unfixable issues (e.g., postcss via next), add an
              inline comment in `package.json` under a top-level `"auditNotes"` key
              explaining why the vulnerability is accepted (e.g., dev-only, no user
              input path, fix not yet released).

            **Step 3 — Verify the build:**
            Run `npm run build` to ensure nothing is broken. If the build fails,
            revert to the state before `--force` was applied.

            **Step 4 — Commit and push changes:**
            - Configure git: `git config user.email "security-bot@users.noreply.github.com" && git config user.name "Security Bot"`
            - Create a new branch: `git checkout -b fix/autonomous-security-${{ github.run_id }}`
            - Stage and commit: `git add package.json package-lock.json && git commit -m "fix: address npm audit security vulnerabilities (autonomous)"`
            - Push: `git push origin HEAD`
            - Open a pull request using the `gh` CLI:
              ```bash
              gh pr create \
                --title "fix: autonomous npm security vulnerability fixes" \
                --body "Automated security fixes applied by Claude Sonnet 4.6.\n\nSee npm audit report for details." \
                --base main
              ```

            **Important constraints:**
            - Do NOT remove or downgrade the direct dependencies listed in `package.json`
              (`next`, `viem`, `x402-mcp`, `zod`).
            - If no actionable fixes are available, open a GitHub issue instead of a PR:
              `gh issue create --title "Security: unresolvable npm audit vulnerabilities" --body "$(npm audit 2>&1 | head -50)"`
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
